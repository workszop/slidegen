<style>
/* ============================================================
   Quantica Lab style layer — brand tokens, Poppins type
   Logic lives in app.js; this file is design only.
   Style contract classes: see README "Style contract".
   ============================================================ */

:root {
  --quantica-pink:    #C41E54;
  --rose-pink:        #FF4D9A;
  --deep-berry:       #8A004C;
  --near-black:       #111111;
  --white:            #FFFFFF;

  --magenta-tint:     #FFE6F1;
  --soft-lilac:       #F3E8FF;
  --cool-gray:        #E6E8EC;
  --light-gray:       #F5F6F8;
  --silver:           #D1D5DB;

  --violet-primary:   #7030A0;
  --violet-deep:      #4F1F75;
  --ink:              #0A1F2C;
  --mist:             #F4EEFA;

  --fg-1:             #111111;
  --fg-2:             #3A3A42;
  --fg-3:             #6B6B76;
  --fg-4:             #9A9AA5;
  --fg-on-pink:       #FFFFFF;
  --fg-brand:         #C41E54;

  --bg-1:             #FFFFFF;
  --bg-2:             #F5F6F8;
  --bg-3:             #FFE6F1;
  --bg-inverse:       #111111;
  --bg-inverse-2:     #1B1B22;

  --border-1:         #E6E8EC;
  --border-2:         #D1D5DB;
  --border-brand:     #C41E54;
  --border-focus:     #FF4D9A;

  --status-success:   #00A37A;
  --status-warning:   #FFC107;
  --status-error:     #DC2626;
  --status-info:      #4F46E5;

  /* ---- Brand fonts (Poppins; bold titles) ---- */
  --font-display:     "Poppins", "Inter", system-ui, -apple-system, sans-serif;
  --font-sans:        "Poppins", "Inter", system-ui, -apple-system, sans-serif;
  --font-mono:        "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --fs-h1:            56px;
  --fs-h2:            28px;
  --fs-h3:            20px;
  --fs-body-lg:       18px;
  --fs-body:          14px;
  --fs-caption:       12px;

  --tracking-display: -0.02em;
  --tracking-h1:      -0.01em;
  --tracking-caps:    0.08em;

  --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
  --space-5: 24px; --space-6: 32px; --space-7: 40px; --space-8: 48px;
  --space-9: 64px; --space-10: 96px;

  --radius-xs: 4px; --radius-sm: 6px; --radius-md: 10px;
  --radius-lg: 16px; --radius-xl: 24px; --radius-pill: 999px;

  --shadow-xs:        0 1px 2px rgba(17, 17, 17, 0.04);
  --shadow-sm:        0 2px 6px rgba(17, 17, 17, 0.06);
  --shadow-md:        0 8px 24px rgba(17, 17, 17, 0.08);
  --shadow-lg:        0 20px 48px rgba(17, 17, 17, 0.10);
  --shadow-pink:      0 12px 32px rgba(196, 30, 84, 0.18);
  --shadow-pink-soft: 0 6px 18px rgba(196, 30, 84, 0.10);
  --inner-hairline:   inset 0 0 0 1px rgba(17, 17, 17, 0.06);

  --ease-standard:    cubic-bezier(0.2, 0.6, 0.2, 1);
  --dur-1: 120ms; --dur-2: 200ms; --dur-3: 320ms; --dur-4: 480ms;

  /* ---- Functional aliases (for shared components, e.g. AI selector) ---- */
  --accent:    var(--quantica-pink);
  --border:    var(--border-1);
  --bg:        var(--bg-1);
}

/* ============================================================
   Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh;
  background: var(--bg-1); color: var(--fg-1);
  font-family: var(--font-sans); font-size: var(--fs-body-lg); line-height: 1.65;
  text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased;
}
button { font: inherit; cursor: pointer; }
:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 2px; border-radius: var(--radius-xs); }
.hidden { display: none !important; }
kbd {
  font-family: var(--font-mono); font-size: var(--fs-caption);
  background: var(--bg-2); color: var(--fg-2);
  border: 1px solid var(--border-2); border-bottom-width: 2px;
  border-radius: var(--radius-xs); padding: 1px 6px;
}

/* ============================================================
   Layout — chrome bar + shell
   ============================================================ */
.chrome {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3) var(--space-6);
  background: rgba(255,255,255,.88); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-1);
}
.chrome-mark { height: 26px; width: auto; }
.chrome .tag {
  font-family: var(--font-mono); font-size: var(--fs-caption);
  letter-spacing: var(--tracking-caps); text-transform: uppercase;
  color: var(--fg-brand); background: var(--magenta-tint);
  padding: 2px 10px; border-radius: var(--radius-pill);
}
.chrome .spacer { flex: 1; }

.lang-toggle { display: flex; border: 1px solid var(--border-2); border-radius: var(--radius-pill); overflow: hidden; }
.lang-toggle button {
  border: 0; background: transparent; color: var(--fg-3);
  font-family: var(--font-mono); font-size: var(--fs-caption);
  padding: 4px 12px; transition: background var(--dur-2) var(--ease-standard), color var(--dur-2) var(--ease-standard);
}
.lang-toggle button[aria-pressed="true"] { background: var(--near-black); color: var(--white); }

.shell { max-width: 1200px; margin: 0 auto; padding: var(--space-7) var(--space-6) var(--space-9); }

/* ============================================================
   Components — shared
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  border: 0; border-radius: var(--radius-md); padding: 10px 22px;
  font-weight: 500;
  transition: background var(--dur-2) var(--ease-standard), color var(--dur-2) var(--ease-standard), border-color var(--dur-2) var(--ease-standard);
}
.btn-primary { background: var(--quantica-pink); color: var(--fg-on-pink); box-shadow: var(--shadow-pink-soft); }
.btn-primary:hover { background: var(--deep-berry); }
.btn-primary:disabled { background: var(--silver); color: var(--white); box-shadow: none; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--fg-brand); border: 1px solid var(--border-brand); }
.btn-ghost:hover { background: var(--magenta-tint); }

.hints { display: flex; gap: var(--space-5); justify-content: center; margin-top: var(--space-6); color: var(--fg-3); font-size: var(--fs-caption); }
.hints span { display: inline-flex; align-items: center; gap: var(--space-2); }

/* ============================================================
   Input helpers
   ============================================================ */
.visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }

.file-chip {
  font-family: var(--font-mono); font-size: var(--fs-caption);
  background: var(--mist); color: var(--violet-deep);
  padding: 4px 14px; border-radius: var(--radius-pill); margin-top: var(--space-2);
}

textarea, .mono-input {
  font-family: var(--font-mono); font-size: var(--fs-body); color: var(--fg-1);
  background: var(--bg-1); border: 1px solid var(--border-2);
  border-radius: var(--radius-md); padding: var(--space-3); width: 100%;
}
textarea:focus, .mono-input:focus { border-color: var(--border-brand); outline: none; box-shadow: 0 0 0 2px var(--magenta-tint); }
textarea { resize: vertical; }

.gen-status { max-width: 480px; margin: 0 auto var(--space-6); text-align: center; color: var(--fg-2); font-size: var(--fs-body); }
.gen-bar { height: 4px; border-radius: var(--radius-pill); background: var(--magenta-tint); overflow: hidden; margin-bottom: var(--space-3); }
.gen-bar div {
  height: 100%; width: 35%; border-radius: var(--radius-pill); background: var(--quantica-pink);
  animation: genSlide 1.2s var(--ease-standard) infinite;
}
@keyframes genSlide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }

.error-panel {
  display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap;
  max-width: 640px; margin: 0 auto var(--space-6);
  background: var(--bg-1); color: var(--status-error);
  border: 1px solid var(--status-error); border-radius: var(--radius-md); padding: var(--space-4) var(--space-5);
}
.error-panel strong { font-family: var(--font-display); font-weight: 700; }
.error-panel .btn { margin-left: auto; padding: 4px 14px; color: var(--status-error); border-color: var(--status-error); }
.error-panel .btn:hover { background: var(--bg-2); }

/* ── Workspace ─────────────────────────────── */
.workspace { display: grid; grid-template-columns: 272px minmax(0, 1fr); gap: var(--space-5); align-items: start; }
.workspace.editing { grid-template-columns: 272px minmax(0, 1fr) 340px; }
.sidebar { display: flex; flex-direction: column; gap: var(--space-5); }
.side-section { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
.side-title { margin: 0; font-family: var(--font-mono); font-weight: 500; font-size: var(--fs-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--fg-3); }
.side-row { display: flex; gap: var(--space-2); align-items: center; justify-content: space-between; }
.dropzone--compact { padding: var(--space-3); text-align: center; border: 2px dashed var(--border-2); border-radius: var(--radius-sm); display: flex; flex-direction: column; gap: var(--space-2); align-items: center; cursor: pointer; }
.dropzone--compact.dragover { border-color: var(--quantica-pink); background: var(--magenta-tint); }
.dropzone--compact .dz-label { font-family: var(--font-display); font-weight: 700; font-size: var(--fs-body); }
#pasteArea { width: 100%; box-sizing: border-box; resize: vertical; font-family: var(--font-mono); font-size: var(--fs-caption); border: 1px solid var(--border-1); border-radius: var(--radius-sm); padding: var(--space-2); background: var(--bg-1); color: var(--fg-1); }
.btn-sm { padding: 2px 10px; font-size: var(--fs-caption); }
.btn-block { width: 100%; justify-content: center; }
.stage-col { display: flex; flex-direction: column; gap: var(--space-3); min-width: 0; }
.ws-stage-wrap { container-type: inline-size; aspect-ratio: 16 / 10; background: var(--slide-bg, var(--bg-1)); border: 1px solid var(--border-1); border-radius: var(--radius-md); overflow: hidden; position: relative; box-shadow: var(--shadow-sm); }
.ws-stage-wrap .slide { position: absolute; inset: 0; width: auto; height: auto; max-height: none; padding: 6cqw 7cqw; font-size: clamp(10px, 2.4cqw, 34px); overflow: hidden; }
.ws-nav { display: flex; align-items: center; justify-content: center; gap: var(--space-4); }
.ws-counter { font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--fg-3); min-width: 5em; text-align: center; }
.editor-panel { display: flex; min-width: 0; }
.editor-panel textarea { flex: 1; min-height: 60vh; resize: none; font-family: var(--font-mono); font-size: var(--fs-caption); line-height: 1.6; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: var(--space-3); background: var(--bg-1); color: var(--fg-1); }
.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); }
.preset { border: 2px solid var(--border-1); border-radius: var(--radius-sm); background: var(--bg-1); padding: var(--space-2); cursor: pointer; text-align: left; }
.preset:hover { border-color: var(--border-2); }
.preset[aria-pressed="true"] { border-color: var(--quantica-pink); }
.preset .dots { display: flex; gap: 4px; margin-bottom: 4px; }
.preset .dots span { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,.15); display: inline-block; }
.preset .name { font-family: var(--font-mono); font-size: var(--fs-caption); font-weight: 500; }
@media (max-width: 1100px) { .workspace.editing { grid-template-columns: 272px minmax(0, 1fr); } .workspace.editing .editor-panel { position: fixed; right: var(--space-3); top: 70px; bottom: var(--space-3); width: min(420px, 90vw); z-index: 30; box-shadow: var(--shadow-lg); } }
@media (max-width: 800px) { .workspace, .workspace.editing { grid-template-columns: 1fr; } .sidebar { flex-direction: row; flex-wrap: wrap; } .side-section { flex: 1 1 240px; } }

/* ============================================================
   Present view
   ============================================================ */
body.presenting .chrome { display: none; }
body.presenting .shell { max-width: none; padding: 0; }

#view-present { position: fixed; inset: 0; background: var(--slide-bg, var(--bg-1)); display: flex; flex-direction: column; }
.present-bar {
  position: absolute; top: 0; left: 0; height: 4px; width: 0%;
  background: var(--slide-accent, var(--quantica-pink)); transition: width var(--dur-4) var(--ease-standard); z-index: 5;
}
.slide-logo {
  position: absolute; top: calc(4px + 2.5vh); right: 3vw; z-index: 4;
  height: clamp(24px, 2.8vh + 1.1vw, 60px); width: auto;
}
/* Slides anchor to a fixed top offset so headings sit at the same height
   on every slide; only the title slide stays vertically centered. */
.stage { flex: 1; display: grid; place-items: start center; padding: 14vh 4vw 3vh; overflow: hidden; }
/* Fluid deck scaling: one viewport-driven base size on the slide,
   everything inside in em — the whole slide grows/shrinks with the window. */
.slide {
  width: min(1600px, 90vw); max-height: 88vh; overflow: auto;
  font-size: clamp(15px, 1.55vw + 0.9vh, 46px);
  color: var(--slide-fg, var(--fg-1));
  --slide-fg-muted: color-mix(in srgb, var(--slide-fg, var(--fg-1)) 72%, var(--slide-bg, var(--bg-1)));
  --slide-surface: color-mix(in srgb, var(--slide-fg, var(--fg-1)) 8%, var(--slide-bg, var(--bg-1)));
}

.slide .slide-eyebrow {
  font-family: var(--font-mono); font-weight: 500; font-size: .55em;
  letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--slide-accent, var(--fg-brand));
  margin-bottom: .9em;
}
.slide h1 {
  font-family: var(--font-display); font-weight: 700;
  font-size: 3em; line-height: 1.05; letter-spacing: var(--tracking-display);
  margin: 0 0 .35em;
}
.slide h2 {
  font-family: var(--font-display); font-weight: 700; font-size: 2.1em;
  line-height: 1.1; letter-spacing: var(--tracking-h1); margin: 0 0 .6em;
}
.slide h3 { font-family: var(--font-display); font-weight: 700; font-size: 1.35em; margin: 1em 0 .5em; }
.slide p, .slide li { font-size: 1em; line-height: 1.55; color: var(--slide-fg-muted); }
.slide p { margin: 0 0 .6em; }
.slide li { margin-bottom: .45em; }
.slide li::marker { color: var(--slide-accent, var(--quantica-pink)); }
.slide strong { color: var(--slide-fg, var(--fg-1)); font-weight: 700; }
.slide em { color: var(--slide-fg, var(--fg-1)); }
.slide a { color: var(--fg-brand); }
/* Mono rules for presenting code — REQUIRED in every style */
.slide code {
  font-family: var(--font-mono); font-size: .9em; color: var(--slide-fg, var(--fg-1));
  background: var(--slide-surface); padding: .1em .4em; border-radius: var(--radius-xs);
}
.slide pre {
  font-family: var(--font-mono);
  background: var(--slide-surface); border: 1px solid var(--slide-surface);
  border-radius: var(--radius-md); padding: .8em; overflow-x: auto; font-size: .8em;
  line-height: 1.5;
}
.slide pre code { background: none; padding: 0; font-size: 1em; }
.slide blockquote {
  margin: .9em 0; padding: .6em 1em;
  border: 1px solid var(--slide-accent, var(--border-brand)); background: var(--magenta-tint);
  border-radius: var(--radius-md); color: var(--deep-berry);
}
.slide blockquote p { color: inherit; margin: 0; }
.slide table { border-collapse: collapse; width: 100%; font-size: .92em; }
.slide th {
  font-family: var(--font-mono); font-size: .6em; letter-spacing: var(--tracking-caps);
  text-transform: uppercase; text-align: left; color: var(--fg-3);
  border-bottom: 2px solid var(--border-2); padding: .5em .7em;
}
.slide td { border-bottom: 1px solid var(--border-1); padding: .55em .7em; color: var(--slide-fg-muted); }

.slide--title { text-align: center; align-self: center; }
.slide--title .slide-eyebrow { color: var(--violet-primary); }
.slide--title h1 { color: var(--slide-accent, var(--quantica-pink)); font-size: 3.6em; }
.slide--title p { font-size: 1.3em; color: var(--slide-fg-muted); }

.present-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-6); color: var(--fg-3); font-size: var(--fs-caption);
}
.present-counter { font-family: var(--font-mono); }

/* ============================================================
   @media
   ============================================================ */
@media (max-width: 768px) {
  .shell { padding: var(--space-6) var(--space-4) var(--space-8); }
  .hints { display: none; }
  .stage { padding: var(--space-6) var(--space-4); }
  .present-footer .hints { display: none; }
}
</style>
</head>

Narzędzie Quantica Lab: z dowolnego dokumentu robi prezentację.
---
## Co tu się dzieje?
- Wrzucasz dokument (.txt, .md, .pdf) - **AI** układa z niego slajdy
- Wszystko dzieje się w przeglądarce - bez serwera i instalacji
- Ta prezentacja to przykład: obejrzyj ją strzałkami ← →
---
## Wczytaj materiał
- Upuść plik w panelu **Dokument** (do 19 MB) albo wklej tekst
- PDF trafia do AI w całości - z tabelami i układem stron
- Gotowy plik .md ze slajdami? Wczyta się od razu, bez AI
---
## Wybierz model AI
- Kliknij wskaźnik modelu w sekcji **Generowanie**
- Do wyboru: Gemini, OpenAI lub Claude - z Twoim kluczem API
> Klucz zostaje w przeglądarce i jest wysyłany wyłącznie do wybranego dostawcy.
---
## Dobierz styl
- Cztery style w sekcji **Styl** - jedno kliknięcie zmienia całą talię
- Kolory pozostają w palecie Quantica Lab, także w eksporcie .pptx
---
## Edytuj treść
- Przycisk **Edytuj** otwiera edytor markdown po prawej stronie slajdu
- Zmiany widać na żywo; slajdy oddziela linia \`---\`
- Podczas generowania edytor otwiera się sam i pokazuje strumień AI
---
## Prezentuj
| Klawisz | Działanie |
|---------|-----------|
| → / spacja | następny slajd |
| ← | poprzedni slajd |
| 1-9 | skok do slajdu |
| Esc | powrót do edycji |
---
## Eksportuj i działaj
- **Pobierz .md** - wczytasz ponownie bez klucza API
- **Pobierz .pptx** - edytowalny PowerPoint w wybranym stylu
- Miłego prezentowania!`,
    en: `# Document → slides
A Quantica Lab tool: turns any document into a presentation.
---
## What is this?
- Drop a document (.txt, .md, .pdf) - **AI** turns it into slides
- Everything runs in your browser - no server, no install
- This deck is the example: browse it with ← →
---
## Load your material
- Drop a file in the **Document** panel (up to 19 MB) or paste text
- PDFs go to the AI whole - tables and layout included
- Got a ready .md deck? It loads instantly, no AI needed
---
## Pick an AI model
- Click the model chip in the **Generate** section
- Choose Gemini, OpenAI, or Claude - with your own API key
> The key stays in your browser and is sent only to the provider you picked.
---
## Choose a style
- Four styles in the **Style** section - one click restyles the whole deck
- Colors stay within the Quantica Lab palette, also in the .pptx export
---
## Edit the content
- The **Edit** button opens a markdown editor to the right of the slide
- Changes render live; slides are separated by a \`---\` line
- During generation the editor opens itself and shows the AI stream
---
## Present
| Key | Action |
|-----|--------|
| → / space | next slide |
| ← | previous slide |
| 1-9 | jump to slide |
| Esc | back to editing |
---
## Export and go
- **Download .md** - reload it anytime without an API key
- **Download .pptx** - editable PowerPoint in the chosen style
- Happy presenting!`,
